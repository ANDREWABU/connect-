<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Community Blog</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
}

/* Post box */
.post {
    background: white;
    padding: 15px;
    margin: 15px 0;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* Header with PFP */
.post-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
}

/* Placeholder PFP */
.pfp {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #888;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: white;
    font-size: 20px;
}

/* Tag styling */
.tags {
    margin-top: 10px;
}

.tag {
    display: inline-block;
    background: #e0e0e0;
    padding: 4px 8px;
    border-radius: 12px;
    font-size: 12px;
    margin-right: 6px;
}

/* Inputs */
input, textarea {
    display: block;
    width: 300px;
    margin-bottom: 8px;
    padding: 6px;
}

textarea {
    height: 80px;
}

button {
    padding: 8px 12px;
}
</style>
</head>

<body>

<h2>Community Blog</h2>

<!-- Post Inputs -->
<input id="authorInput" placeholder="Your name (optional)">
<input id="titleInput" placeholder="Post title">
<textarea id="contentInput" placeholder="Write your post..."></textarea>
<input id="tagsInput" placeholder="Tags (comma separated)">
<button onclick="createPost()">Post</button>

<hr>

<div id="posts"></div>

<script>
// Load posts from server
async function loadPosts() {
    const res = await fetch('/posts');
    const posts = await res.json();

    const postsDiv = document.getElementById('posts');
    postsDiv.innerHTML = '';

    posts.forEach(post => {
        const div = document.createElement('div');
        div.className = 'post';

        const firstLetter = post.author
            ? post.author.charAt(0).toUpperCase()
            : "?";

        const tagsHTML = (post.tags || []).map(tag =>
            `<span class="tag">#${tag}</span>`
        ).join('');

        div.innerHTML = `
            <div class="post-header">
                <div class="pfp">${firstLetter}</div>
                <div>
                    <h3>${post.title}</h3>
                    <small>By ${post.author} • ${post.time}</small>
                </div>
            </div>
            <p>${post.content}</p>
            <div class="tags">${tagsHTML}</div>
        `;

        postsDiv.appendChild(div);
    });
}

// Create new post
async function createPost() {
    const author = document.getElementById('authorInput').value || "Anonymous";
    const title = document.getElementById('titleInput').value;
    const content = document.getElementById('contentInput').value;
    const tagsRaw = document.getElementById('tagsInput').value;

    const tags = tagsRaw
        .split(',')
        .map(t => t.trim())
        .filter(t => t.length > 0);

    await fetch('/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, author, tags })
    });

    // Clear inputs
    document.getElementById('authorInput').value = '';
    document.getElementById('titleInput').value = '';
    document.getElementById('contentInput').value = '';
    document.getElementById('tagsInput').value = '';

    loadPosts();
}

// Auto-refresh every 3 seconds
setInterval(loadPosts, 3000);

// Initial load
loadPosts();
</script>

</body>
</html>
