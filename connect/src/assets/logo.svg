<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle background -->
  <circle cx="20" cy="20" r="20" fill="#111"/>
  
  <!-- Running person -->
  <g transform="translate(20, 20)">
    <!-- Head -->
    <circle cx="0" cy="-11" r="2.5" fill="white"/>
    <!-- Body -->
    <line x1="0" y1="-8" x2="0" y2="-2" stroke="white" strokeWidth="2" strokeLinecap="round"/>
    <!-- Left arm -->
    <line x1="0" y1="-6" x2="-3" y2="-3" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
    <!-- Right arm -->
    <line x1="0" y1="-6" x2="3" y2="-8" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
    <!-- Left leg -->
    <line x1="0" y1="-2" x2="-3" y2="3" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
    <!-- Right leg -->
    <line x1="0" y1="-2" x2="3" y2="1" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
  </g>

  <!-- Big C -->
  <text x="22" y="28" 
    fontFamily="Georgia, serif" 
    fontSize="18" 
    fontWeight="bold"
    fill="white"
    opacity="0.25"
    textAnchor="middle">C</text>
</svg>